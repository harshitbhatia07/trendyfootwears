<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cart | Trendy Footwears</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar">

<div class="logo">
TRENDY FOOTWEARS
</div>

<a href="index.html" style="color:white;">
Back To Shop
</a>

</nav>

<section
style="padding:120px 8%;">

<h1
style="color:#FFD700;
margin-bottom:30px;">

Your Cart

</h1>

<div id="cart-items">

</div>

<div id="cart-total">

</div>

<a
href="checkout.html"
class="hero-btn">

Proceed To Checkout

</a>

</section>

<script>

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

const cartItems =
document.getElementById(
"cart-items"
);

const totalDiv =
document.getElementById(
"cart-total"
);

let total = 0;

cart.forEach(item=>{

total += item.price;

cartItems.innerHTML += `

<div
style="
background:#161616;
padding:20px;
margin-bottom:20px;
border-radius:15px;">

<h3>${item.name}</h3>

<p>₹${item.price}</p>

</div>

`;

});

totalDiv.innerHTML = `

<h2
style="
color:#FFD700;
margin:30px 0;">

Total:
₹${total}

</h2>

`;

localStorage.setItem(
"totalAmount",
total
);

</script>

</body>
</html>
