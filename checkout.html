<!DOCTYPE html>
<html lang="en">

<head>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Checkout</title>

<style>

body{
    margin:0;
    padding:0;
    background:#0f0f0f;
    font-family:Arial,sans-serif;
    color:#fff;
}

section{
    max-width:700px;
    margin:auto;
}

#orderForm{
    background:#1a1a1a;
    padding:35px;
    border-radius:15px;
    border:1px solid rgba(255,215,0,0.2);
    box-shadow:0 0 25px rgba(255,215,0,0.08);
}

#orderForm input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#2a2a2a;
    color:#fff;
    font-size:16px;
    box-sizing:border-box;
    outline:none;
    transition:.3s;
}

#orderForm input:focus{
    border:1px solid #FFD700;
    box-shadow:0 0 10px rgba(255,215,0,.4);
}

#amount{
    color:#FFD700;
    text-align:center;
    margin:20px 0;
}

p{
    background:#222;
    padding:10px 15px;
    border-radius:8px;
    display:inline-block;
    font-weight:bold;
}

img{
    margin-top:15px;
    border-radius:12px;
    border:2px solid #FFD700;
    max-width:100%;
}

.add-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#FFD700;
    color:#000;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.add-btn:hover{
    background:#ffea61;
    transform:translateY(-2px);
}

@media(max-width:768px){

section{
    padding:60px 20px !important;
}

#orderForm{
    padding:25px;
}

}

</style>

</head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
Checkout
</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<section
style="
padding:100px 8%;">

<h1
style="
color:#FFD700;
margin-bottom:20px;">

Checkout

</h1>

<form id="orderForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="text"
id="phone"
placeholder="Phone Number"
required>

<input
type="text"
id="address"
placeholder="Full Address"
required>

<input
type="text"
id="city"
placeholder="City"
required>

<input
type="text"
id="state"
placeholder="State"
required>

<h2 id="amount">

</h2>

<h3
style="color:#FFD700;">

UPI ID

</h3>

<p>
haryanvi-083@ptyes
</p>

<img
src="assets/upi-qr.png"
width="250">

<br><br>

<input
type="text"
id="utr"
placeholder="Enter UTR / Transaction ID"
required>

<button
type="submit"
class="add-btn">

Place Order

</button>

</form>

</section>
<script>

const amount =
localStorage.getItem("totalAmount") || 0;

document.getElementById("amount").innerHTML =
`Total Amount : ₹${amount}`;

document.getElementById("orderForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const order = {

        name:
        document.getElementById("name").value,

        phone:
        document.getElementById("phone").value,

        address:
        document.getElementById("address").value,

        city:
        document.getElementById("city").value,

        state:
        document.getElementById("state").value,

        utr:
        document.getElementById("utr").value,

        amount

    };

    localStorage.setItem(
        "latestOrder",
        JSON.stringify(order)
    );

    const orderId =
    "ORD" +
    Math.floor(
        100000 + Math.random() * 900000
    );

    fetch(
        "https://script.google.com/macros/s/AKfycbzPEdMaEuBE7qJ81XupqunXbYqCDQG00xsjH89pj2UinvhiczECA3_H7vLoNT11abkA/exec",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                orderId: orderId,
                name: order.name,
                phone: order.phone,
                address: order.address,
                city: order.city,
                state: order.state,
                utr: order.utr,
                amount: order.amount
            })
        }
    )
    .then(response => response.text())
    .then(data => {

        localStorage.setItem(
            "orderId",
            orderId
        );

        window.location =
        "success.html";

    })
    .catch(error => {

        console.error(error);

        alert(
            "Order save nahi hua. Google Sheet connection check karo."
        );

    });

});


</script>

</body>
</html>>
