<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
Checkout
</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<section
style="
padding:100px 8%;">

<h1
style="
color:#FFD700;
margin-bottom:20px;">

Checkout

</h1>

<form id="orderForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="text"
id="phone"
placeholder="Phone Number"
required>

<input
type="text"
id="address"
placeholder="Full Address"
required>

<input
type="text"
id="city"
placeholder="City"
required>

<input
type="text"
id="state"
placeholder="State"
required>

<h2 id="amount">

</h2>

<h3
style="color:#FFD700;">

UPI ID

</h3>

<p>
haryanvi-083@ptyes
</p>

<img
src="assets/upi-qr.png"
width="250">

<br><br>

<input
type="text"
id="utr"
placeholder="Enter UTR / Transaction ID"
required>

<button
type="submit"
class="add-btn">

Place Order

</button>

</form>

</section>

<script>

const amount =
localStorage.getItem(
"totalAmount"
);

document.getElementById(
"amount"
).innerHTML=
`Total Amount : ₹${amount}`;

document
.getElementById(
"orderForm"
)

.addEventListener(
"submit",

function(e){

e.preventDefault();

const order = {

name:
document.getElementById(
"name"
).value,

phone:
document.getElementById(
"phone"
).value,

address:
document.getElementById(
"address"
).value,

city:
document.getElementById(
"city"
).value,

state:
document.getElementById(
"state"
).value,

utr:
document.getElementById(
"utr"
).value,

amount

};

localStorage.setItem(
"latestOrder",
JSON.stringify(order)
);

window.location =
"success.html";

});

</script>

</body>
</html>
