<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body{
background:#000;
color:#fff;
font-family:Arial;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:15px;
background:#d4af37;
border:none;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<h1>Checkout</h1>

<input type="text" id="name" placeholder="Full Name">

<input type="tel" id="phone" placeholder="Phone Number">

<textarea id="address" placeholder="Full Address"></textarea>

<button onclick="placeOrder()">
Place Order
</button>

</div>

<script>
function placeOrder(){

const name =
document.getElementById("name").value;

const phone =
document.getElementById("phone").value;

const address =
document.getElementById("address").value;

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let message =
"🛒 NEW ORDER%0A%0A";

message +=
"Name: "+name+"%0A";

message +=
"Phone: "+phone+"%0A";

message +=
"Address: "+address+"%0A%0A";

let total=0;

cart.forEach(item=>{
message += item.name+" ₹"+item.price+"%0A";
total += item.price;
});

message += "%0A💰 Total ₹"+total;

window.open(
"https://wa.me/918054336991?text="+message,
"_blank"
);

}
</script>

</body>
</html>
