<!DOCTYPE html>
<html>

<head>

<title>
Admin Dashboard
</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<section
style="
padding:100px 8%;">

<h1
style="
color:#FFD700;
margin-bottom:40px;">

Admin Dashboard

</h1>

<div id="orders">

</div>

</section>

<script>

const order =
JSON.parse(
localStorage.getItem(
"latestOrder"
)
);

if(order){

document.getElementById(
"orders"
).innerHTML = `

<div
style="
background:#161616;
padding:20px;
border-radius:20px;">

<h3>
${order.name}
</h3>

<p>
${order.phone}
</p>

<p>
${order.address}
</p>

<p>
${order.city}
</p>

<p>
${order.state}
</p>

<p>

UTR:
${order.utr}

</p>

<p>

Amount:
₹${order.amount}

</p>

</div>

`;

}

</script>

</body>
</html>
