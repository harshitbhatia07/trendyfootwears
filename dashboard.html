<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0b0b0b;
color:white;
padding:30px;
}

h1{
color:#d4af37;
margin-bottom:30px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.box{
background:#151515;
padding:25px;
border-radius:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#222;
border:none;
color:white;
border-radius:10px;
}

button{
padding:12px 20px;
background:#25D366;
border:none;
border-radius:10px;
margin-top:15px;
cursor:pointer;
font-weight:700;
}

.product{
background:#222;
padding:15px;
margin-top:10px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>Admin Dashboard</h1>

<div class="container">

<div class="box">

<h2>Add Product</h2>

<input
id="name"
placeholder="Product Name">

<input
id="price"
placeholder="Price">

<input
id="image"
placeholder="Image URL">

<button onclick="addProduct()">
Add Product
</button>

</div>

<div class="box">

<h2>Products</h2>

<div id="products">

</div>

</div>

</div>

<script>

if(
localStorage.getItem(
"adminLoggedIn"
)!=="true"
){

window.location=
"admin.html";

}

let products =
JSON.parse(
localStorage.getItem("products")
) || [];

function saveProducts(){

localStorage.setItem(
"products",
JSON.stringify(products)
);

}

function renderProducts(){

const container =
document.getElementById(
"products"
);

container.innerHTML="";

products.forEach((p,index)=>{

container.innerHTML+=`

<div class="product">

<h3>${p.name}</h3>

<p>₹${p.price}</p>

<button onclick="deleteProduct(${index})">

Delete

</button>

</div>

`;

});

}

function addProduct(){

const name =
document.getElementById(
"name"
).value;

const price =
document.getElementById(
"price"
).value;

const image =
document.getElementById(
"image"
).value;

products.push({
name,
price,
image
});

saveProducts();

renderProducts();

}

function deleteProduct(index){

products.splice(index,1);

saveProducts();

renderProducts();

}

renderProducts();

</script>

</body>
</html>
